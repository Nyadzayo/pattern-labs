<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%236366f1'/%3E%3Ctext x='16' y='23' font-size='19' font-family='Georgia,serif' font-weight='bold' fill='white' text-anchor='middle'%3E%CE%BB%3C/text%3E%3C/svg%3E"
    />
    <title>Pattern Lab</title>
    <script>
      // Apply persisted theme before first paint to avoid a flash.
      try {
        var raw = localStorage.getItem('pattern-lab:v1')
        if (raw && JSON.parse(raw).theme === 'light') {
          document.documentElement.classList.remove('dark')
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
